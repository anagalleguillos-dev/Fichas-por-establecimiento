<head>

<title>Fichas por Establecimiento · SLEP Llanquihue</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#EFF2F4;--ink:#15222C;--petrol:#0E4E5C;--petrol-d:#0A3843;--line:#D8E0E5;--card:#FFFFFF;--muted:#5B6A74;
--green:#1F7A54;--amber:#B0761A;--red:#AC3527;--blue:#2C6E8F;
--disp:'Archivo',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;}
*{box-sizing:border-box}
body{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);font-size:14px}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
.top{grid-column:1/-1;background:var(--petrol-d);color:#fff;padding:14px 22px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.top h1{font-family:var(--disp);font-weight:800;font-size:18px;margin:0}
.top .sub{color:#BFD6DC;font-size:12.5px}.top .spacer{flex:1}
.top .legend{font-size:11px;color:#AFCAD1;display:flex;gap:14px}.top .legend b{color:#fff}
.nav{border-right:1px solid var(--line);background:#F7F9FA;display:flex;flex-direction:column;height:calc(100vh - 50px);position:sticky;top:0}
.search{padding:12px}.search input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
.chips{display:flex;gap:6px;padding:0 12px 10px}
.chip{font-size:11.5px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.list{overflow-y:auto;flex:1;padding-bottom:20px}
.grp{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:1.2px;color:var(--petrol);text-transform:uppercase;padding:12px 16px 5px;position:sticky;top:0;background:#F7F9FA}
.item{padding:8px 14px 8px 16px;border-left:3px solid transparent;cursor:pointer;display:flex;align-items:center;gap:8px}
.item:hover{background:#EDF1F3}.item.sel{background:#E3EDEF;border-left-color:var(--petrol)}
.item .nm{flex:1;font-size:12.6px;line-height:1.25}
.item .dot{width:7px;height:7px;border-radius:50%;flex:none}.dot.rural{background:#7FA65B}.dot.urbano{background:#2C6E8F}
.item .cr{width:6px;height:6px;border-radius:50%;background:var(--red);flex:none}
.vb{font-family:var(--mono);font-size:11px;font-weight:600;padding:1px 5px;border-radius:5px;flex:none}
.vb.up{color:var(--green);background:#E6F2EC}.vb.dn{color:var(--red);background:#F7E7E5}.vb.fl{color:var(--muted);background:#ECEFF1}
.ficha{padding:22px 26px;max-width:1000px}
.fhead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2px solid var(--petrol);padding-bottom:14px;margin-bottom:18px}
.fhead h2{font-family:var(--disp);font-weight:800;font-size:23px;margin:0 0 6px;line-height:1.15}
.badges{display:flex;gap:7px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;background:#EAF0F2;color:var(--petrol-d);font-weight:600}
.badge.rbd{font-family:var(--mono);background:var(--ink);color:#fff}.badge.cat{background:var(--petrol);color:#fff}
.printbtn{font-size:12px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.printbtn:hover{background:#F2F5F6}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.kpi .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .v{font-family:var(--disp);font-weight:800;font-size:24px;margin-top:4px;line-height:1}
.kpi .s{font-size:11px;margin-top:4px;font-family:var(--mono)}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}.warn{color:var(--amber)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.panel h3{font-family:var(--disp);font-weight:700;font-size:13.5px;margin:0 0 12px;color:var(--petrol-d);letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.panel h3 .tag{font-size:10px;font-weight:600;color:var(--muted);background:#EEF2F4;padding:2px 7px;border-radius:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alerts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.al{font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:7px}
.al::before{content:'';width:8px;height:8px;border-radius:50%;background:currentColor}
.al.r{color:var(--red);background:#F8E9E7}.al.a{color:var(--amber);background:#F6EEDD}.al.g{color:var(--green);background:#E6F2EC}
/* niveles */
.lv{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #EEF2F4}
.lv:last-child{border:0}
.lv .nm{width:120px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.lv .crit{font-size:9.5px;background:#F8E9E7;color:var(--red);padding:1px 6px;border-radius:4px;font-weight:700}
.lv .spk{flex:1}
.lv .n25{font-family:var(--mono);font-size:12px;width:74px;text-align:right;color:var(--muted)}
.lv .vv{width:66px;text-align:right}
.idps-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
.idps-row .nm{width:210px}.idps-row .bar{flex:1;height:9px;background:#EEF2F4;border-radius:5px;overflow:hidden;position:relative}
.idps-row .bar>i{position:absolute;top:0;left:0;height:100%;border-radius:5px;background:var(--blue)}
.idps-row .num{font-family:var(--mono);width:96px;text-align:right;font-size:11.5px}
.rec{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #EEF2F4;font-size:12.5px}
.rec:last-child{border:0}.rec .n{font-family:var(--mono);font-weight:600;color:var(--red);width:30px}
.rec .info{flex:1}.rec .info b{font-weight:600}.rec .info span{color:var(--muted);font-size:11px}
.empty{color:var(--muted);font-size:12.5px;font-style:italic}
.svgwrap{width:100%}text{font-family:var(--body)}
@media (max-width:820px){.app{grid-template-columns:1fr}.nav{position:static;height:auto;max-height:340px}.grid2{grid-template-columns:1fr}}
@media print{.nav,.top,.printbtn{display:none}.app{display:block}.ficha{max-width:100%}.panel{break-inside:avoid}}
.terr{padding:9px 12px;border-bottom:1px solid var(--line);background:#E9EFF1}
.terr .lab{font-family:var(--disp);font-weight:700;font-size:10.5px;letter-spacing:1.2px;color:var(--petrol);text-transform:uppercase;margin-bottom:6px}
.terr .tbtn{display:block;width:100%;text-align:left;font-size:12.6px;padding:8px 10px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;margin-bottom:6px;color:var(--ink);font-weight:600}
.terr .tbtn:hover{background:#F2F6F7}.terr .tbtn.sel{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.terr .coms{display:flex;flex-wrap:wrap;gap:5px}
.terr .coms .c{font-size:11px;padding:4px 9px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;color:var(--muted)}
.terr .coms .c:hover{background:#F2F6F7}.terr .coms .c.sel{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.ptable{width:100%;border-collapse:collapse;font-size:12.3px}
.ptable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--line);padding:7px 8px;font-weight:600}
.ptable td{padding:7px 8px;border-bottom:1px solid #EEF2F4}
.ptable tbody tr{cursor:pointer}.ptable tbody tr:hover{background:#F2F6F7}
.ptable .num{font-family:var(--mono);text-align:right}
.ptable .cd{width:8px;height:8px;border-radius:50%;display:inline-block}

.mvcas{display:flex;height:30px;border-radius:7px;overflow:hidden;border:1px solid #E7EDEF;margin-bottom:10px}
.mvcas>span{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;transition:width .5s}
.mvleg{display:flex;flex-wrap:wrap;gap:14px}
.mvlg{display:flex;align-items:center;gap:6px;font-size:12px;color:#5B6A74}
.mvlg i{width:10px;height:10px;border-radius:3px;display:inline-block;flex:none}
.mvlg b{color:#15222C;font-variant-numeric:tabular-nums}
.mvh{font-size:11.5px;font-weight:700;color:#5B6A74;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}

.ccrow{padding:10px 0;border-top:1px solid #EEF2F4}.ccrow:first-child{border-top:0}
.cctop{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.ccname{font-weight:700;font-size:14px}
.ccd{font-weight:800;font-size:14px;color:#A23B36;white-space:nowrap;font-variant-numeric:tabular-nums}
.ccd small{color:#C0703A;font-weight:700;font-size:12px}
.ccbot{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:3px}
.ccflow{font-size:12.5px;color:#5B6A74;font-variant-numeric:tabular-nums}.ccflow b{color:#15222C}
.ccspk{flex:none}
</style></head>

  html+=`<div class="kpis">
    ${kpi('Matrícula '+(e.mat['2026']!=null?'2026':'reciente'),m26,varTxt,varCls)}
    ${kpi('Variación 2020–26',(e.var!=null?((e.var>0?'+':'')+e.var+'%'):'s/d'),'tendencia',varCls)}
    ${kpi('Permanece en la red SLEP',mv?mv.permpct+'%':'—',mv?((mv.stay+mv.move)+' de '+mv.tot+' egresados'):'sin egreso 6°/8°',mv?(mv.permpct>=75?'pos':(mv.permpct>=60?'neu':'warn')):'neu')}
    ${kpi('SIMCE 8° Lectura '+ULT,lec!=null?lec:'—',lecS,lecCls)}
    ${kpi('Asistencia '+(lm?MESN[lm]+' 2026':'2026'),av26!=null?av26+'%':'—',asS,asCls)}
  </div>`;
  html+=`<div class="panel"><h3>Trayectoria de matrícula total <span class="tag">2020–2026</span></h3>${barChart(e.mat)}</div>`;
  // NIVELES
  if(e.niveles&&Object.keys(e.niveles).length){
    let rows=LVORD.filter(n=>e.niveles[n]).map(n=>{const d=e.niveles[n];
      return `<div class="lv"><div class="nm">${n}${d.crit?'<span class="crit">CRÍTICO</span>':''}</div><div class="spk">${spark(d.serie)}</div><div class="n25">${d.y2025??'–'} <span style="color:#98A5AD;font-size:10px">(25)</span></div><div class="vv">${vbadge(d.var)}</div></div>`;}).join('');
    html+=`<div class="panel"><h3>Matrícula por nivel <span class="tag">2021–2025 · base por estudiante</span></h3>${rows}</div>`;
  } else {
    html+=`<div class="panel"><h3>Matrícula por nivel</h3><div class="empty">Nivel único (parvularia): jardín infantil / sala cuna. Ver trayectoria total arriba.</div></div>`;
  }
  html+=critCursosPanel(e.critc);
  // ASISTENCIA
  if((e.asis2025&&Object.keys(e.asis2025).length)||(e.asis2026&&Object.keys(e.asis2026).length)){
    html+=`<div class="panel"><h3>Asistencia mensual <span class="tag">2025 completo · 2026 a la fecha</span></h3>${asistChart(e.asis2025||{},e.asis2026||{})}</div>`;
  }
  // SIMCE + FUGA
  html+=`<div class="grid2">`;
  if(e.simce&&Object.keys(e.simce).length){
    const colors={'Lectura':'#0E4E5C','Matemática':'#B0761A'};let blocks='';
    Object.keys(e.simce).forEach(gr=>{const series=Object.keys(e.simce[gr]).map(asg=>({label:asg,color:colors[asg]||'#2C6E8F',pts:Object.entries(e.simce[gr][asg]).map(([y,v])=>({y:+y,v}))}));const chart=lineChart(series);if(chart)blocks+=`<div style="margin-bottom:16px"><div style="font-size:12.5px;font-weight:700;color:#41505A;margin-bottom:4px">${gr}</div>${chart}</div>`;});
    html+=`<div class="panel"><h3>SIMCE por nivel <span class="tag">puntaje</span></h3>${blocks||'<div class="empty">Sin puntajes SIMCE registrados.</div>'}</div>`;
  }else{html+=`<div class="panel"><h3>SIMCE</h3><div class="empty">Sin mediciones SIMCE (nivel parvulario o sin datos).</div></div>`;}
  if(mv)html+=movPanel(mv,false);if(e.feed)html+=feedPanel(e.feed);if(!mv&&!e.feed)html+=`<div class="panel"><h3>Movimiento entre establecimientos</h3><div class="empty">No aplica: sin egresos de 6°/8° ni ingreso a 1° medio en la red (nivel parvulario).</div></div>`;
  html+=`</div>`;
  // IDPS
  if(e.idps&&e.idps.length){
    let rows=e.idps.map(x=>{const w=Math.min(100,(x.y25!=null?x.y25:0));const av=x.var;const vt=av==null?'':`<span style="color:${av>=0?'#1F7A54':'#AC3527'}">${av>0?'+':''}${av}</span>`;
      return `<div class="idps-row"><span class="nm">${x.ind} <span style="color:#98A5AD;font-size:10.5px">(${x.g})</span></span><span class="bar"><i style="width:${w}%"></i></span><span class="num">${x.y24??'–'} → ${x.y25??'–'} ${vt}</span></div>`;}).join('');
    html+=`<div class="panel"><h3>IDPS <span class="tag">2024 → 2025</span></h3>${rows}</div>`;
  }
  $('#ficha').innerHTML=html;
}
// ---------- VISTA TERRITORIAL ----------
function setTerrSelUI(){
  const bt=document.getElementById('btnTotal'); if(bt)bt.classList.toggle('sel',territSel==='total');
  document.querySelectorAll('#comChips .c').forEach(c=>c.classList.toggle('sel',c.dataset.com===territSel));
}
function nivelesRows(niv){
  return LVORD.filter(n=>niv[n]).map(n=>{const d=niv[n];
    return `<div class="lv"><div class="nm">${n}${d.crit?'<span class="crit">CRÍTICO</span>':''}</div><div class="spk">${spark(d.serie)}</div><div class="n25">${d.y2025??'–'} <span style="color:#98A5AD;font-size:10px">(25)</span></div><div class="vv">${vbadge(d.var)}</div></div>`;}).join('');
}
function selEstab(rbd){const e=EE.find(x=>x.rbd===rbd);if(!e)return;territSel=null;sel=rbd;renderList();setTerrSelUI();renderFicha(e);window.scrollTo(0,0);}
function asisLast(obj){const ks=Object.keys(obj||{}).map(Number);if(!ks.length)return null;const m=Math.max(...ks);return obj[String(m)];}

function panoramaEE(lista){
  let rows=lista.slice().sort((a,b)=>(b.mat['2026']||0)-(a.mat['2026']||0)).map(e=>{
    const crit=(e.niv_criticos&&e.niv_criticos.length)?'#AC3527':(e.area.toLowerCase()==='rural'?'#7FA65B':'#2C6E8F');
    const as=asisLast(e.asis2026);
    return `<tr onclick="selEstab(${e.rbd})"><td><span class="cd" style="background:${crit}"></span></td>
      <td>${e.nombre}</td><td class="num">${e.mat['2026']??'–'}</td><td>${vbadge(e.var)}</td>
      <td class="num">${e.mov?e.mov.salepct+'%':'–'}</td><td class="num">${as!=null?as+'%':'–'}</td></tr>`;}).join('');
  return `<table class="ptable"><thead><tr><th></th><th>Establecimiento</th><th style="text-align:right">Mat 26</th><th>Var 20–26</th><th style="text-align:right">A otro sost.</th><th style="text-align:right">Asist 26</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function comunaTable(){
  let rows=T.resumen.slice().sort((a,b)=>(b.mat2026||0)-(a.mat2026||0)).map(r=>{
    const vc=r.var==null?'neu':(r.var>2?'pos':(r.var<-2?'neg':'neu'));
    return `<tr onclick="renderTerritorio('${r.comuna}')"><td><b>${r.comuna}</b></td><td class="num">${r.n}</td>
      <td class="num">${r.mat2026??'–'}</td><td>${vbadge(r.var)}</td>
      <td class="num">${r.mov?r.mov.salepct+'%':'–'}</td><td class="num">${r.asis26!=null?r.asis26+'%':'–'}</td>
      <td class="num">${r.crit_ee}</td></tr>`;}).join('');
  return `<table class="ptable"><thead><tr><th>Comuna</th><th style="text-align:right">EE</th><th style="text-align:right">Mat 26</th><th>Var</th><th style="text-align:right">A otro sost.</th><th style="text-align:right">Asist</th><th style="text-align:right">EE críticos</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function renderTerritorio(scope){
  territSel=scope; sel=null; renderList(); setTerrSelUI();
  const a=scope==='total'?T.total:T.comunas[scope];
  const lista=scope==='total'?EE:EE.filter(e=>e.comuna===scope);
  const titulo=scope==='total'?'Panorama del SLEP · todo el territorio':('Comuna de '+scope);
  const lm=Math.max(...Object.keys(a.asis2026||{}).map(Number),0)||null;
  const as26=lm?a.asis2026[String(lm)]:null;
  const as25=lm&&a.asis2025?a.asis2025[String(lm)]:null;
  const asD=(as26!=null&&as25!=null)?(as26-as25).toFixed(1):null;
  const varCls=a.var==null?'neu':(a.var>2?'pos':(a.var<-2?'neg':'neu'));

  let html=`<div class="fhead"><div><h2>${titulo}</h2><div class="badges"><span class="badge cat">${a.n} establecimientos</span>${scope==='total'?'<span class="badge">5 comunas</span>':''}<span class="badge">${a.crit_ee} con nivel crítico</span></div></div><button class="printbtn" onclick="window.print()">Imprimir</button></div>`;
  html+=`<div class="kpis">
    ${kpi('Matrícula 2026',a.mat['2026']??'–',(a.var!=null?((a.var>0?'+':'')+a.var+'% vs 2020'):''),varCls)}
    ${kpi('Establecimientos',a.n,scope==='total'?'todo el SLEP':scope,'neu')}
    ${kpi('Permanece en la red SLEP',a.mov?a.mov.permpct+'%':'–',a.mov?((a.mov.stay+a.mov.move)+' de '+a.mov.tot):'','pos')}
    ${kpi('Asistencia '+(lm?MESN[lm]+' 26':'26'),as26!=null?as26+'%':'–',(asD!=null?((asD>0?'+':'')+asD+' pts vs 2025'):''),(asD==null?'neu':(asD>=0?'pos':'neg')))}
    ${kpi('Niveles críticos',a.crit_ee+' EE','con algún nivel en caída','warn')}
  </div>`;
  html+=`<div class="panel"><h3>Matrícula total <span class="tag">2020–2026</span></h3>${barChart(a.mat)}</div>`;
  html+=`<div class="grid2">
    <div class="panel"><h3>Matrícula por nivel <span class="tag">2021–2025</span></h3>${nivelesRows(a.niveles)}</div>
    <div class="panel"><h3>Asistencia mensual <span class="tag">2025 vs 2026</span></h3>${asistChart(a.asis2025||{},a.asis2026||{})}</div>
  </div>`;
  html+=movPanel(a.mov,true);
  if(scope==='total'){
    html+=`<div class="panel"><h3>Comparación por comuna <span class="tag">clic para abrir</span></h3>${comunaTable()}</div>`;
  }
  html+=`<div class="panel"><h3>Establecimientos ${scope==='total'?'del SLEP':'de '+scope} <span class="tag">clic para ver ficha</span></h3>${panoramaEE(lista)}</div>`;
  $('#ficha').innerHTML=html;
  window.scrollTo(0,0);
}

// build comuna chips + handlers
document.getElementById('comChips').innerHTML=T.resumen.map(r=>`<span class="c" data-com="${r.comuna}">${r.comuna}</span>`).join('');
document.getElementById('btnTotal').onclick=()=>renderTerritorio('total');
document.querySelectorAll('#comChips .c').forEach(c=>c.onclick=()=>renderTerritorio(c.dataset.com));

$('#q').addEventListener('input',e=>{q=e.target.value.toLowerCase();renderList()});
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filtro=c.dataset.f;renderList();});
renderList();
renderTerritorio('total');
</script></body></html>
